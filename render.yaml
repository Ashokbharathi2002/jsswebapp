services:
  - type: web
    name: jothi-solar-solutions
    env: python
    buildCommand: "bash ./build.sh"
    preDeployCommand: "python manage.py migrate"
    startCommand: "python manage.py migrate && python create_default_superuser.py && gunicorn solar_installation.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: jothi-solar-db
          property: connectionString

databases:
  - name: jothi-solar-db
    plan: free
