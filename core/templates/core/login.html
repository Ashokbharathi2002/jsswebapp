{% extends 'core/base.html' %}

{% block title %}Login | Jothi Solar Solutions{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <!-- Glass Login Card -->
        <div class="card glass-card p-4 p-md-5 border-0">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-warning fs-1"></i>
                <h2 class="fw-bold mt-2 text-white">Sign In</h2>
                <p class="text-secondary small">Access your Jothi Solar Solutions Dashboard</p>
            </div>
            
            <form id="loginForm" method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="usernameInput" class="form-label text-white fw-semibold small">Username or Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary" style="border-radius: 10px 0 0 10px;">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" class="form-control" id="usernameInput" name="username" placeholder="Enter username" required style="border-radius: 0 10px 10px 0 !important;">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="passwordInput" class="form-label text-white fw-semibold small">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary" style="border-radius: 10px 0 0 10px;">
                            <i class="bi bi-key-fill"></i>
                        </span>
                        <input type="password" class="form-control" id="passwordInput" name="password" placeholder="Enter password" required style="border-radius: 0 10px 10px 0 !important;">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-gold w-100 py-3 fw-bold mb-3">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Log In
                </button>
            </form>
            
            <div class="text-center">
                <p class="text-secondary small mb-0">Are you a Staff member? <a href="{% url 'signup' %}" class="text-warning fw-semibold text-decoration-none">Register your Staff account here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
